<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAI — Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-body">
    <div class="auth-bg">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="auth-center">
        <div class="auth-card otp-card">
            <div class="otp-icon-wrap">
                <div class="otp-icon-pulse"></div>
                <div class="otp-icon"><i class="fas fa-lock-open"></i></div>
            </div>
            <div class="auth-card-header">
                <h2>Set New Password</h2>
                <p>Create a strong new password for your MedAI account.</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }}" id="flashAlert">
                        <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }}"></i>
                        <span>{{ message }}</span>
                        <button class="alert-close" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
                    </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('reset_password') }}" id="resetForm" novalidate>
                <div class="form-group" id="passFieldGroup">
                    <label for="password" class="form-label"><i class="fas fa-lock"></i> New Password</label>
                    <div class="input-wrap password-wrap">
                        <input type="password" id="password" name="password" class="form-input" placeholder="Enter new password" required>
                        <button type="button" class="eye-toggle" id="eyeToggle1"><i class="fas fa-eye" id="eyeIcon1"></i></button>
                        <div class="input-focus-line"></div>
                    </div>
                    <div class="strength-bar-wrap">
                        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                        <span class="strength-label" id="strengthLabel">Enter a password</span>
                    </div>
                    <span class="field-error" id="passErr"></span>
                </div>

                <div class="form-group" id="confirmFieldGroup">
                    <label for="confirm_password" class="form-label"><i class="fas fa-check-circle"></i> Confirm Password</label>
                    <div class="input-wrap password-wrap">
                        <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="Re-enter new password" required>
                        <button type="button" class="eye-toggle" id="eyeToggle2"><i class="fas fa-eye" id="eyeIcon2"></i></button>
                        <div class="input-focus-line"></div>
                    </div>
                    <span class="field-error" id="confirmErr"></span>
                </div>

                <button type="submit" class="auth-btn" id="resetBtn">
                    <span class="btn-text"><i class="fas fa-save"></i> Update Password</span>
                    <span class="btn-loader" style="display:none;"><i class="fas fa-circle-notch fa-spin"></i> Updating...</span>
                </button>
            </form>

            <div class="otp-back-row">
                <a href="{{ url_for('login') }}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        function setupToggle(btnId, iconId, inputId) {
            document.getElementById(btnId).addEventListener('click', function() {
                const input = document.getElementById(inputId);
                const icon = document.getElementById(iconId);
                input.type = input.type === 'password' ? 'text' : 'password';
                icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            });
        }
        setupToggle('eyeToggle1', 'eyeIcon1', 'password');
        setupToggle('eyeToggle2', 'eyeIcon2', 'confirm_password');

        document.getElementById('password').addEventListener('input', function() {
            const val = this.value;
            const score = [val.length >= 8, /[A-Z]/.test(val), /[0-9]/.test(val), /[^A-Za-z0-9]/.test(val)].filter(Boolean).length;
            const colors = ['#ef4444', '#f59e0b', '#3b82f6', '#10b981'];
            const labels = ['Weak', 'Fair', 'Good', 'Strong'];
            const fill = document.getElementById('strengthFill');
            const label = document.getElementById('strengthLabel');
            if (!val) { fill.style.width = '0'; label.textContent = 'Enter a password'; return; }
            fill.style.width = (score * 25) + '%';
            fill.style.background = colors[score - 1] || colors[0];
            label.textContent = labels[score - 1] || 'Weak';
            label.style.color = colors[score - 1] || colors[0];
        });

        document.getElementById('resetForm').addEventListener('submit', function(e) {
            const pw = document.getElementById('password').value;
            const cp = document.getElementById('confirm_password').value;
            let valid = true;
            document.getElementById('passErr').textContent = '';
            document.getElementById('confirmErr').textContent = '';
            document.getElementById('passFieldGroup').classList.remove('error');
            document.getElementById('confirmFieldGroup').classList.remove('error');

            if (pw.length < 6) {
                document.getElementById('passErr').textContent = 'Password must be at least 6 characters.';
                document.getElementById('passFieldGroup').classList.add('error');
                valid = false;
            }
            if (pw !== cp) {
                document.getElementById('confirmErr').textContent = 'Passwords do not match.';
                document.getElementById('confirmFieldGroup').classList.add('error');
                valid = false;
            }
            if (!valid) { e.preventDefault(); return; }
            const btn = document.getElementById('resetBtn');
            btn.querySelector('.btn-text').style.display = 'none';
            btn.querySelector('.btn-loader').style.display = 'flex';
            btn.disabled = true;
        });
    </script>
</body>
</html>
